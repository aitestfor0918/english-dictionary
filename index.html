<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人英文字典</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Main Content Area -->
        <main id="view-container">
            <!-- Views will be injected here -->
        </main>



        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-view="learn">
                <span class="icon">🏠</span>
                <span class="label">學習與單字查詢</span>
            </button>
            <button class="nav-item" data-view="words">
                <span class="icon">📚</span>
                <span class="label">單字卡</span>
            </button>
            <button class="nav-item" data-view="home">
                <span class="icon">📖</span>
                <span class="label">複習</span>
            </button>
            <button class="nav-item" data-view="daily">
                <span class="icon">🎴</span>
                <span class="label">學習進度與設定</span>
            </button>
        </nav>
    </div>

    <!-- Templates -->
    <template id="view-home">
        <div class="view home-view">
            <!-- Header Section -->
            <div class="home-header">
                <h1>複習</h1>
                <div class="home-stats">
                    <div class="stat-pill">今日完成：<span id="home-today-count">0</span></div>
                    <div class="stat-pill">剩餘弱點：<span id="home-weakness-count">0</span></div>
                </div>
            </div>

            <!-- Pro Review Setup Panel -->
            <div class="pro-setup-panel" style="background:var(--secondary); border-radius:16px; padding:16px; margin:10px 0; border:1px solid var(--border);">
                <div class="setup-row" style="margin-bottom:10px;">
                    <h4 style="margin-bottom:6px;font-size:0.85rem;color:var(--muted);">練習模式</h4>
                    <div class="section-tabs" id="pro-setup-mode" style="background:var(--bg); border:1px solid var(--border);">
                        <button class="tab-btn active" data-val="smart">智慧</button>
                        <button class="tab-btn" data-val="weak">弱點</button>
                        <button class="tab-btn" data-val="free">自由</button>
                    </div>
                </div>
                <div class="setup-row" style="margin-bottom:10px;">
                    <h4 style="margin-bottom:6px;font-size:0.85rem;color:var(--muted);">長度</h4>
                    <div class="section-tabs" id="pro-setup-length" style="background:var(--bg); border:1px solid var(--border);">
                        <button class="tab-btn active" data-val="5">快 (1m)</button>
                        <button class="tab-btn" data-val="10">中 (5m)</button>
                        <button class="tab-btn" data-val="20">深 (10m)</button>
                    </div>
                </div>
                <div class="setup-row" style="margin-bottom:15px;">
                    <h4 style="margin-bottom:6px;font-size:0.85rem;color:var(--muted);">發聲情境</h4>
                    <div class="section-tabs" id="pro-setup-context" style="background:var(--bg); border:1px solid var(--border);">
                        <button class="tab-btn active" data-val="full">🔊 完整 (發聲)</button>
                        <button class="tab-btn" data-val="silent">🔇 靜音 (心中默讀)</button>
                    </div>
                </div>

                <button id="main-start-btn" class="main-start-btn" style="width:100%; border-radius:12px;">
                    <div class="btn-content">
                        <span class="btn-title">啟動 Pro 引擎</span>
                        <span class="btn-subtitle">進入高強度循環訓練</span>
                    </div>
                    <span class="btn-arrow">🚀</span>
                </button>
            </div>
            
            <div class="home-footer-hint">
                💡 最強複習模式：字卡 ➔ 聽力 ➔ 跟讀，打造肌肉記憶！
            </div>
        </div>
    </template>
    <template id="view-learn">
        <div class="view learn-view">
            <div class="view-header">
                <h1>學習與單字查詢</h1>
            </div>

            <!-- Top Search Bar -->
            <div class="home-search-container" style="margin-bottom: 8px;">
                <div class="home-search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="learn-search-input" placeholder="查詢單字或表達..." autocomplete="off">
                </div>
            </div>

            <!-- 4 功能方塊 -->
            <div class="learn-mini-grid">
                <div class="learn-mini-card" data-subview="core">
                    <div class="mini-card-icon">💎</div>
                    <span class="mini-card-label">核心單字</span>
                </div>
                <div class="learn-mini-card" data-subview="music">
                    <div class="mini-card-icon">🎵</div>
                    <span class="mini-card-label">音樂術語</span>
                </div>
                <div class="learn-mini-card" data-subview="listening">
                    <div class="mini-card-icon">🎧</div>
                    <span class="mini-card-label">聽力測驗</span>
                </div>
                <div class="learn-mini-card" data-subview="shadowing">
                    <div class="mini-card-icon">🗣</div>
                    <span class="mini-card-label">影子跟讀</span>
                </div>
            </div>

            <!-- 翻卡學習 Section -->
            <div class="learn-section-title" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <span>🎴 翻卡學習</span>
                <span class="progress-text" style="font-size: 0.8rem; font-weight: normal; color: var(--muted); text-transform: none; letter-spacing: normal;">已完成 <span id="learn-daily-count">0/8</span></span>
            </div>
            <div id="learn-daily-card-container" class="flashcard-container" style="height: 220px; margin-bottom: 0; margin-top: 6px;"></div>
            <div id="learn-daily-actions" class="flashcard-actions hidden" style="margin-bottom: 6px;">
                <button class="btn btn-hard" data-rank="0">不會</button>
                <button class="btn btn-normal" data-rank="1">普通</button>
                <button class="btn btn-easy" data-rank="2">會</button>
            </div>
        </div>
    </template>

    <template id="view-words">
        <div class="view words-view">
            <div class="view-header">
                <h1>單字卡</h1>
                <p class="subtitle">我的收藏 <span id="collection-badge" class="badge">0</span></p>
            </div>

            <div id="words-collection-list" class="item-list">
                <!-- Collection rendered directly here -->
            </div>
        </div>
    </template>



    <template id="view-daily">
        <div class="view daily-view">
            <div class="view-header" style="flex-direction: column; align-items: stretch; margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: baseline;">
                    <h1 style="margin-bottom: 0;">學習進度與設定</h1>
                    <div id="daily-date" class="date-display" style="font-size: 0.9rem; color: var(--muted);"></div>
                </div>
                <p id="me-join-date" style="font-size: 0.85rem; color: var(--muted); margin-top: 6px;">加入日期: -</p>
            </div>

            <div class="stats-card-group" style="margin-bottom: 20px;">
                <div class="me-stat-card">
                    <span class="stat-num" id="me-total-words">0</span>
                    <span class="stat-unit">已掌握</span>
                </div>
                <div class="me-stat-card">
                    <span class="stat-num" id="me-streak-record">0</span>
                    <span class="stat-unit">總學習天數</span>
                </div>
                <div class="me-stat-card">
                    <span class="stat-num" id="me-mastery-score">0</span>
                    <span class="stat-unit">專注點數</span>
                </div>
            </div>

            <div id="daily-stats-dashboard" class="stats-dashboard">
                <!-- Data injected via JS -->
            </div>

            <div class="settings-list" style="margin-top: 20px;">
                <div class="setting-item">
                    <span>🌙 深色模式</span>
                    <label class="switch">
                        <input type="checkbox" id="dark-mode-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <div class="settings-list" style="margin-top: 10px;">
                <div class="setting-item danger" id="me-clear-data" style="cursor: pointer;">
                    <span>清除學習統計 (這會清空所有的進度紀錄)</span>
                </div>
            </div>
        </div>
    </template>

    <template id="view-search">
        <div class="view search-view">
            <div class="search-header">
                <h1>個人英文字典</h1>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="輸入英文單字..." autocomplete="off">
                    <button id="clear-search">✕</button>
                </div>
            </div>
            <div id="search-results" class="results-container">
                <div class="empty-state">
                    <p>開始查詢單字吧！</p>
                </div>
            </div>
        </div>
    </template>

    <template id="view-collection">
        <div class="view collection-view">
            <div class="view-header">
                <h1>我的單字卡</h1>
                <span id="collection-count" class="badge">0</span>
            </div>
            <div id="collection-list" class="item-list"></div>
        </div>
    </template>

    <template id="view-flashcards">
        <div class="view flashcards-view">
            <div class="view-header">
                <h1>卡片複習</h1>
                <div class="progress-bar-container">
                    <div id="review-progress" class="progress-bar"></div>
                </div>
            </div>
            <div id="flashcard-container" class="flashcard-container">
                <!-- Card will be injected here -->
            </div>
            <div id="flashcard-actions" class="flashcard-actions hidden">
                <button class="btn btn-hard" data-rank="0">不會</button>
                <button class="btn btn-normal" data-rank="1">普通</button>
                <button class="btn btn-easy" data-rank="2">簡單</button>
            </div>
            <div id="free-practice-actions" class="flashcard-actions hidden">
                <button class="btn btn-normal" id="free-next-btn" style="background:var(--secondary);color:var(--text);">➡ 下一張</button>
                <button class="btn btn-hard" id="free-weak-btn">😅 有點不熟</button>
                <button class="btn btn-easy" id="free-master-btn">✅ 我已掌握</button>
            </div>
        </div>
    </template>

    <template id="view-music">
        <div class="view music-view">
            <div class="view-header" style="display:flex; flex-direction:row; justify-content:flex-start; align-items:baseline; gap:12px;">
                <h1 style="margin-bottom:0;">音樂術語</h1>
                <button id="music-words-refresh" style="background:none; border:none; color:var(--text); opacity:0.7; font-size:1rem; font-weight:600; cursor:pointer; padding:0;">🔄 刷新單字</button>
            </div>
            <div class="category-tabs" id="music-tabs">
                <div class="tabs-scroll">
                    <button class="tab-item active" data-category="all">全部</button>
                    <button class="tab-item" data-category="理論調式">理論調式</button>
                    <button class="tab-item" data-category="爵士語言">爵士語言</button>
                    <button class="tab-item" data-category="錄音製作">錄音製作</button>
                    <button class="tab-item" data-category="演奏技巧">演奏技巧</button>
                    <button class="tab-item" data-category="音樂風格">音樂風格</button>
                </div>
            </div>
            <div id="music-terminology-list" class="item-list"></div>
        </div>
    </template>

    <template id="view-listening">
        <div class="view listening-view">
            <div class="view-header" style="flex-direction: column; align-items: stretch; gap: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h1>聽力測驗</h1>
                    <div class="streak-badge">Progress: <span id="listening-streak">0/10</span></div>
                </div>
            </div>

            <div class="listening-box">
                <div class="play-container-wrapper">
                    <div class="mini-player-bar">
                        <button id="listening-play-btn" class="mini-play-btn">▶</button>
                        <p id="listening-status">What word did you hear?</p>
                    </div>
                </div>

                <div id="listening-options" class="options-grid">
                    <!-- 4 options will be here -->
                </div>

                <div id="listening-feedback" class="feedback-panel hidden">
                    <!-- Result shown here -->
                    <div id="listening-result-content"></div>
                    <div id="listening-feedback-actions" style="display: flex; gap: 10px; margin-top: 15px; display: none;">
                        <button id="listening-add-btn" class="mini-btn" style="flex: 1; padding: 12px; background: rgba(16,185,129,0.1); color: var(--success); border-color: var(--success);">
                            ➕ 加入單字卡
                        </button>
                        <button id="listening-next-btn" class="mini-btn primary" style="flex: 1.5; padding: 12px; font-weight: bold;">
                            下一題 Next ➔
                        </button>
                    </div>
                </div>
            </div>

            <!-- Goal Completion UI -->
            <div id="listening-completion" class="completion-screen hidden">
                <div class="check-mark">🎉</div>
                <h2>今日聽力完成！</h2>
                <p>你已完成建議練習量，是否繼續？</p>
                <div class="flashcard-actions" style="margin-top: 30px;">
                    <button class="btn btn-easy" id="listening-continue-btn">繼續練習</button>
                    <button class="btn btn-normal" id="listening-end-btn" style="background: var(--secondary); color: var(--text);">今日結束</button>
                </div>
            </div>
        </div>
    </template>

    <template id="view-core">
        <div class="view core-view">
            <div class="view-header" style="display:flex; flex-direction:row; justify-content:flex-start; align-items:baseline; gap:12px;">
                <h1 style="margin-bottom:0;">核心單字庫</h1>
                <button id="core-words-refresh" style="background:none; border:none; color:var(--text); opacity:0.7; font-size:1rem; font-weight:600; cursor:pointer; padding:0;">🔄 刷新單字</button>
            </div>
            <div class="category-tabs" id="core-words-tabs">
                <div class="tabs-scroll">
                    <button class="tab-item active" data-category="all">全部</button>
                    <button class="tab-item" data-category="日常用語">日常用語</button>
                    <button class="tab-item" data-category="基礎核心">基礎核心</button>
                    <button class="tab-item" data-category="行動描述">行動描述</button>
                    <button class="tab-item" data-category="邏輯特徵">邏輯特徵</button>
                    <button class="tab-item" data-category="職場社交">職場社交</button>
                </div>
            </div>
            <div id="core-words-list" class="item-list"></div>
        </div>
    </template>
    
    <template id="view-shadowing">
        <div class="view shadowing-view">
            <div class="view-header" style="flex-direction: column; align-items: stretch; gap: 10px;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <h1 style="margin-bottom: 0;">影子跟讀</h1>
                    <div class="header-settings" style="display: flex; flex-direction: column; gap: 6px; align-items: flex-end;">
                        <!-- Speed Control -->
                        <div class="speed-selector" style="display: flex; align-items: center; background: var(--secondary); padding: 2px; border-radius: 10px; border: 1px solid var(--border);">
                            <span style="font-size: 0.7rem; color: var(--muted); margin: 0 5px;">Speed:</span>
                            <div class="section-tabs" id="shadowing-speed-switcher" style="padding: 0; background: none; box-shadow: none; display: flex; gap: 2px; margin-bottom: 0;">
                                <button class="loop-btn" data-speed="0.65">0.65x</button>
                                <button class="loop-btn" data-speed="0.75">0.75x</button>
                                <button class="loop-btn active" data-speed="1.0">1.0x</button>
                            </div>
                        </div>
                        
                        <!-- Loop Control -->
                        <div class="loop-selector">
                            <span style="font-size: 0.7rem; color: var(--muted); margin-right: 5px;">Loop:</span>
                            <button class="loop-btn active" data-count="1">1x</button>
                            <button class="loop-btn" data-count="3">3x</button>
                            <button class="loop-btn" data-count="5">5x</button>
                        </div>
                    </div>
                </div>

                <div class="section-tabs" id="shadowing-mode-switcher" style="margin-bottom: 0;">
                    <button class="tab-btn active" data-mode="daily">Daily Target (5)</button>
                    <button class="tab-btn" data-mode="practice">Unlimited Practice</button>
                </div>
            </div>

            <div class="shadowing-stats-mini" id="shadowing-stats-mini" style="display: flex; justify-content: center; gap: 20px; font-size: 0.9rem; font-weight: 600; padding: 10px 0;">
                <div class="stat-mini-item" style="color: var(--muted);">Done: <span id="shadow-stat-done" style="color: var(--text);">0</span></div>
                <div class="stat-mini-item" style="color: var(--success);">Good: 🌱 <span id="shadow-stat-good">0</span></div>
                <div class="stat-mini-item" style="color: var(--error);">Try: ⚠️ <span id="shadow-stat-try">0</span></div>
            </div>

            <div class="shadowing-main" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; margin: 10px 0;">
                <div id="shadowing-quality-badge" class="quality-badge hidden"></div>
                <div id="shadowing-step-indicator" class="step-indicator hidden">Step 1</div>
                <div id="shadowing-active-chunk" class="shadowing-active-chunk">Ready?</div>
                <div id="shadowing-ghost-sentence" class="shadowing-ghost-sentence hidden">...</div>
                
                <div id="shadowing-status" class="listening-status" style="margin-top: 20px;"></div>
                
                <div id="shadowing-text-container" class="hidden">
                    <p id="shadowing-meaning" style="margin-top: 20px; font-weight: 600;"></p>
                    <p id="shadowing-info" class="music-context" style="font-size: 0.8rem;"></p>
                </div>
            </div>

            <div class="shadowing-actions">
                <button id="shadowing-replay" class="shadow-btn secondary">
                    <span class="icon">🔄</span> Replay
                </button>
                <button id="shadowing-next" class="shadow-btn primary">
                    Next <span class="icon">➡</span>
                </button>
            </div>

            <!-- Shadowing Goal Completion UI -->
            <div id="shadowing-completion" class="completion-screen hidden">
                <div class="check-mark">🎉</div>
                <h2>今日跟讀完成！</h2>
                <p>建議休息讓大腦吸收，是否繼續？</p>
                <div class="flashcard-actions" style="margin-top: 30px;">
                    <button class="btn btn-easy" id="shadowing-continue-btn">繼續練習</button>
                    <button class="btn btn-normal" id="shadowing-end-btn" style="background: var(--secondary); color: var(--text);">今日結束</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Global Components -->
    <div id="notification" class="notification hidden"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <template id="view-weakness">
        <div class="view weakness-view">
            <div class="view-header">
                <h1>弱點分析</h1>
                <p class="subtitle">Focus on your learning gaps</p>
            </div>

            <!-- Summary Dashboard -->
            <div id="weakness-summary" class="stats-dashboard">
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="count-gap">-</span>
                        <span class="stat-label">未學單字</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="count-error">-</span>
                        <span class="stat-label">複習錯誤</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="count-memory">-</span>
                        <span class="stat-label">久未複習</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="count-listen">-</span>
                        <span class="stat-label">聽力弱標</span>
                    </div>
                </div>
            </div>

            <!-- Top 10 List -->
            <div class="weakness-section">
                <h3>最弱單字 Top 10</h3>
                <div id="weakness-top-list" class="weakness-list">
                    <!-- Top words injected here -->
                </div>
            </div>

            <!-- Targeted Learning CTA -->
            <div class="targeted-ctas">
                <button class="shadow-btn primary" id="weakness-focus-flash">針對性複習</button>
                <button class="shadow-btn secondary" id="weakness-focus-listen">針對性聽力</button>
                <button class="shadow-btn secondary" id="weakness-focus-shadow" style="grid-column: span 2;">針對性跟讀</button>
            </div>
        </div>
    </template>
    <template id="view-pro-review">
        <div class="view pro-review-view">
            <div class="view-header" style="flex-direction:row;justify-content:space-between;align-items:center;">
                <div style="flex:1;">
                    <h1 id="pro-review-title" style="font-size:1.5rem; margin-bottom:0;">複習</h1>
                    <p class="subtitle" id="pro-review-subtitle" style="margin-top:2px;">Word 1 / 10</p>
                </div>
                <button class="shadow-btn secondary" id="pro-review-quit-btn" style="padding:5px 12px; font-size:0.85rem;">Quit</button>
            </div>
            
            <div class="progress-bar-container" style="margin-top:10px;">
                <div id="pro-review-progress" class="progress-bar" style="width:0%;"></div>
            </div>

            <!-- Dynamic DOM container for the sub-views (Flashcard / Listen / Shadow) -->
            <div id="pro-review-stage-container" style="flex:1; display:flex; flex-direction:column; align-items:stretch; margin-top:20px; overflow-y:auto; overflow-x:hidden;">
                <!-- Stage content generated via JS -->
            </div>
            
            <div id="pro-review-completion" class="completion-screen hidden" style="margin-top:20px;">
                <div class="check-mark" style="font-size:4rem; margin-bottom:10px;">🏆</div>
                <h2>訓練完成！</h2>
                <div id="pro-review-results" style="margin-top:20px; text-align:left; background:var(--secondary); padding:20px; border-radius:12px; border:1px solid var(--border);">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span>單字完成數:</span>
                        <strong id="res-completed" style="color:var(--primary); font-size:1.2rem;">0</strong>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span>弱點強化次數:</span>
                        <strong id="res-reinforced" style="color:var(--accent); font-size:1.2rem;">0</strong>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span>剩餘弱點單字:</span>
                        <strong id="res-weakness" style="color:var(--error); font-size:1.2rem;">0</strong>
                    </div>
                </div>
                <button class="shadow-btn primary" id="pro-review-finish-btn" style="width:100%; margin-top:30px; font-size:1.1rem; padding:15px;">返回首頁</button>

        </div>
