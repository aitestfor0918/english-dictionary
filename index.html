<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人英文字典</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Main Content Area -->
        <main id="view-container">
            <!-- Views will be injected here -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-view="home">
                <span class="icon">🏠</span>
                <span class="label">首頁</span>
            </button>
            <button class="nav-item" data-view="learn">
                <span class="icon">📖</span>
                <span class="label">學習</span>
            </button>
            <button class="nav-item" data-view="words">
                <span class="icon">📚</span>
                <span class="label">單字</span>
            </button>
            <button class="nav-item" data-view="daily">
                <span class="icon">🎴</span>
                <span class="label">複習</span>
            </button>
            <button class="nav-item" data-view="me">
                <span class="icon">👤</span>
                <span class="label">我的</span>
            </button>
        </nav>
    </div>

    <!-- Templates -->
    <template id="view-home">
        <div class="view home-view">
            <!-- Top Search Bar -->
            <div class="home-search-container">
                <div class="home-search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="home-search-input" placeholder="查詢單字或表達..." autocomplete="off">
                </div>
            </div>

            <!-- Header Section -->
            <div class="home-header">
                <h1>Today Learning</h1>
                <div class="home-stats">
                    <div class="stat-pill">今日完成：<span id="home-today-count">0 / 10</span></div>
                    <div class="stat-pill">學習天數：<span id="home-streak-days">0 days</span></div>
                </div>
            </div>

            <!-- One-Tap Start Button -->
            <div class="one-tap-start-container">
                <button id="main-start-btn" class="main-start-btn">
                    <div class="btn-content">
                        <span class="btn-title">立即開始學習</span>
                        <span class="btn-subtitle" id="main-start-status">點擊啟動今日任務</span>
                    </div>
                    <span class="btn-arrow">🚀</span>
                </button>
            </div>

            <!-- Learning Mode Grid -->
            <div class="learning-grid">
                <button class="mode-card" data-mode="daily">
                    <span class="mode-icon">📆</span>
                    <div class="mode-info">
                        <span class="mode-label">Daily</span>
                        <span class="mode-desc">每日任務</span>
                    </div>
                </button>
                <button class="mode-card" data-mode="listening">
                    <span class="mode-icon">🎧</span>
                    <div class="mode-info">
                        <span class="mode-label">Listening</span>
                        <span class="mode-desc">聽力測驗</span>
                    </div>
                </button>
                <button class="mode-card" data-mode="shadowing">
                    <span class="mode-icon">🗣</span>
                    <div class="mode-info">
                        <span class="mode-label">Shadowing</span>
                        <span class="mode-desc">影子跟讀</span>
                    </div>
                </button>
            </div>
            
            <div class="home-footer-hint">
                💡 每天進步一點點，累積成強大的音樂英文力！
            </div>
        </div>
    </template>
    <template id="view-learn">
        <div class="view learn-view">
            <div class="view-header">
                <h1>學習中心</h1>
                <p class="subtitle">提升音樂英文實力的必經之路</p>
            </div>

            <div class="learn-grid-full">
                <div class="learn-card" data-subview="listening">
                    <div class="card-icon">🎧</div>
                    <div class="card-body">
                        <h3>聽力測驗</h3>
                        <p>透過音樂情境例句訓練聽力敏銳度</p>
                        <span class="card-status">挑戰中 · streak ${state.streak || 0}</span>
                    </div>
                </div>
                <div class="learn-card" data-subview="shadowing">
                    <div class="card-icon">🗣</div>
                    <div class="card-body">
                        <h3>影子跟讀</h3>
                        <p>模仿樂手口吻，練就道地演奏口語</p>
                        <span class="card-status">Loop: ${state.shadowingLoop}x</span>
                    </div>
                </div>
                <div class="learn-card" data-subview="daily-english">
                    <div class="card-icon">💡</div>
                    <div class="card-body">
                        <h3>日常大師</h3>
                        <p>排練、錄音室必備的短語與句型</p>
                        <span class="card-status">80+ 表達</span>
                    </div>
                </div>
                <div class="learn-card" data-subview="music">
                    <div class="card-icon">🎵</div>
                    <div class="card-body">
                        <h3>術語研究</h3>
                        <p>從理論到製作的專業術語彙整</p>
                        <span class="card-status">基礎與進階編排</span>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="view-words">
        <div class="view words-view">
            <div class="view-header">
                <h1>單字工具</h1>
                <div class="search-tab-bar">
                    <div class="search-box-global">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="words-search-input" placeholder="查詢單字..." autocomplete="off">
                    </div>
                </div>
            </div>

            <div class="words-sections">
                <div class="section-tabs" id="words-tab-control">
                    <button class="tab-btn active" data-sec="collection">我的收藏</button>
                    <button class="tab-btn" data-sec="weakness">弱點分析</button>
                    <button class="tab-btn" data-sec="search-results" id="words-api-tab">搜尋結果</button>
                </div>

                <div id="words-section-content" class="section-content">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>
    </template>

    <template id="view-me">
        <div class="view me-view">
            <div class="profile-header">
                <div class="user-avatar">🎵</div>
                <div class="user-info">
                    <h2>Musician Student</h2>
                    <p id="me-join-date">加入日期: -</p>
                </div>
            </div>

            <div class="stats-card-group">
                <div class="me-stat-card">
                    <span class="stat-num" id="me-total-words">0</span>
                    <span class="stat-unit">已掌握</span>
                </div>
                <div class="me-stat-card">
                    <span class="stat-num" id="me-streak-record">0</span>
                    <span class="stat-unit">最高連勝</span>
                </div>
                <div class="me-stat-card">
                    <span class="stat-num" id="me-mastery-score">0</span>
                    <span class="stat-unit">專注點數</span>
                </div>
            </div>

            <div class="settings-list">
                <div class="setting-item">
                    <span>跟讀循環次數</span>
                    <div class="setting-controls" id="me-loop-setting">
                        <button data-val="1">1</button>
                        <button data-val="3">3</button>
                        <button data-val="5">5</button>
                    </div>
                </div>
                <div class="setting-item danger" id="me-clear-data">
                    <span>清除學習統計 (警告)</span>
                </div>
            </div>
        </div>
    </template>

    <template id="view-daily">
        <div class="view daily-view">
            <div class="view-header">
                <h1>Today's Learning</h1>
                <div id="daily-date" class="date-display"></div>
            </div>

            <div id="daily-stats-dashboard" class="stats-dashboard">
                <!-- Data injected via JS -->
            </div>
            
            <div id="daily-card-container" class="flashcard-container">
                <!-- Word card will be injected here -->
            </div>

            <div id="daily-actions" class="flashcard-actions hidden">
                <button class="btn btn-hard" data-rank="0">不會</button>
                <button class="btn btn-normal" data-rank="1">普通</button>
                <button class="btn btn-easy" data-rank="2">會</button>
            </div>

            <div id="daily-progress-footer" class="progress-footer">
                <div class="progress-text">已完成 <span id="daily-count">0/8</span></div>
            </div>
        </div>
    </template>

    <template id="view-search">
        <div class="view search-view">
            <div class="search-header">
                <h1>個人英文字典</h1>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="輸入英文單字..." autocomplete="off">
                    <button id="clear-search">✕</button>
                </div>
            </div>
            <div id="search-results" class="results-container">
                <div class="empty-state">
                    <p>開始查詢單字吧！</p>
                </div>
            </div>
        </div>
    </template>

    <template id="view-collection">
        <div class="view collection-view">
            <div class="view-header">
                <h1>我的單字庫</h1>
                <span id="collection-count" class="badge">0</span>
            </div>
            <div id="collection-list" class="item-list"></div>
        </div>
    </template>

    <template id="view-flashcards">
        <div class="view flashcards-view">
            <div class="view-header">
                <h1>卡片複習</h1>
                <div class="progress-bar-container">
                    <div id="review-progress" class="progress-bar"></div>
                </div>
            </div>
            <div id="flashcard-container" class="flashcard-container">
                <!-- Card will be injected here -->
            </div>
            <div id="flashcard-actions" class="flashcard-actions hidden">
                <button class="btn btn-hard" data-rank="0">不會</button>
                <button class="btn btn-normal" data-rank="1">普通</button>
                <button class="btn btn-easy" data-rank="2">簡單</button>
            </div>
        </div>
    </template>

    <template id="view-music">
        <div class="view music-view">
            <div class="view-header">
                <h1>音樂專業術語</h1>
            </div>
            <div class="category-tabs" id="music-tabs">
                <div class="tabs-scroll">
                    <button class="tab-item active" data-category="all">全部</button>
                    <button class="tab-item" data-category="Performance">Performance</button>
                    <button class="tab-item" data-category="Jazz">Jazz</button>
                    <button class="tab-item" data-category="Recording">Recording</button>
                    <button class="tab-item" data-category="Live">Live</button>
                </div>
            </div>
            <div id="music-terminology-list" class="item-list"></div>
        </div>
    </template>

    <template id="view-listening">
        <div class="view listening-view">
            <div class="view-header" style="flex-direction: column; align-items: stretch; gap: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h1>Listening</h1>
                    <div class="streak-badge">Streak: <span id="listening-streak">0</span></div>
                </div>
                
                <div class="section-tabs" id="listening-mode-switcher">
                    <button class="tab-btn active" data-mode="daily">Daily Target</button>
                    <button class="tab-btn" data-mode="practice">Unlimited Practice</button>
                </div>
            </div>

            <div class="listening-box">
                <div class="play-container">
                    <button id="listening-play-btn" class="play-main-btn">▶</button>
                    <p id="listening-status">What word did you hear?</p>
                </div>

                <div id="listening-options" class="options-grid">
                    <!-- 4 options will be here -->
                </div>

                <div id="listening-feedback" class="feedback-panel hidden">
                    <!-- Result shown here -->
                </div>
            </div>

            <!-- Goal Completion UI -->
            <div id="listening-completion" class="completion-screen hidden">
                <div class="check-mark">🎉</div>
                <h2>今日聽力完成！</h2>
                <p>你已完成建議練習量，是否繼續？</p>
                <div class="flashcard-actions" style="margin-top: 30px;">
                    <button class="btn btn-easy" id="listening-continue-btn">繼續練習</button>
                    <button class="btn btn-normal" id="listening-end-btn" style="background: var(--secondary); color: var(--text);">今日結束</button>
                </div>
            </div>
        </div>
    </template>

    <template id="view-daily-english">
        <div class="view daily-english-view">
            <div class="view-header">
                <h1>Daily English</h1>
            </div>
            <div class="category-tabs" id="daily-english-tabs">
                <div class="tabs-scroll">
                    <button class="tab-item active" data-category="all">全部</button>
                    <button class="tab-item" data-category="Daily Life">日常生活</button>
                    <button class="tab-item" data-category="Conversation">社交對話</button>
                    <button class="tab-item" data-category="Emotion">情緒表達</button>
                    <button class="tab-item" data-category="Work">工作</button>
                    <button class="tab-item" data-category="Communication">電話/訊息</button>
                </div>
            </div>
            <div id="daily-english-list" class="item-list"></div>
        </div>
    </template>
    
    <template id="view-shadowing">
        <div class="view shadowing-view">
            <div class="view-header" style="flex-direction: column; align-items: stretch; gap: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h1>Shadowing</h1>
                    <div class="header-settings" style="display: flex; gap: 10px; align-items: center;">
                        <div class="loop-selector">
                            <span style="font-size: 0.7rem; color: var(--muted); margin-right: 5px;">Loop:</span>
                            <button class="loop-btn active" data-count="1">1x</button>
                            <button class="loop-btn" data-count="3">3x</button>
                            <button class="loop-btn" data-count="5">5x</button>
                        </div>
                    </div>
                </div>

                <div class="section-tabs" id="shadowing-mode-switcher">
                    <button class="tab-btn active" data-mode="daily">Daily Target (5)</button>
                    <button class="tab-btn" data-mode="practice">Unlimited Practice</button>
                </div>
                
                <p style="font-size: 0.8rem; color: var(--muted); text-align: center; font-style: italic; margin-top: -5px;">
                    💡 跟讀品質比數量更重要
                </p>
            </div>

            <div class="shadowing-stats-mini" id="shadowing-stats-mini">
                <div class="stat-mini-item">Done: <span id="shadow-stat-done">0</span></div>
                <div class="stat-mini-item">Good: 🌱 <span id="shadow-stat-good">0</span></div>
                <div class="stat-mini-item">Try: ⚠️ <span id="shadow-stat-try">0</span></div>
            </div>

            <div class="speed-control-container" style="padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 0.9rem; font-weight: 600;">Speed:</span>
                <div class="section-tabs" id="shadowing-speed-switcher" style="padding: 0; background: none; box-shadow: none;">
                    <button class="tab-btn small" data-speed="0.65">0.65x</button>
                    <button class="tab-btn small" data-speed="0.75">0.75x</button>
                    <button class="tab-btn small" data-speed="1.0">1.0x</button>
                </div>
            </div>

            <div class="shadowing-main" style="min-height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;">
                <div id="shadowing-quality-badge" class="quality-badge hidden"></div>
                <div id="shadowing-step-indicator" class="step-indicator hidden">Step 1</div>
                <div id="shadowing-active-chunk" class="shadowing-active-chunk">Ready?</div>
                <div id="shadowing-ghost-sentence" class="shadowing-ghost-sentence hidden">...</div>
                
                <div id="shadowing-status" class="listening-status" style="margin-top: 20px;"></div>
                
                <div id="shadowing-text-container" class="hidden">
                    <p id="shadowing-meaning" style="margin-top: 20px; font-weight: 600;"></p>
                    <p id="shadowing-info" class="music-context" style="font-size: 0.8rem;"></p>
                </div>
            </div>

            <div class="shadowing-actions">
                <button id="shadowing-replay" class="shadow-btn secondary">
                    <span class="icon">🔄</span> Replay
                </button>
                <button id="shadowing-next" class="shadow-btn primary">
                    Next <span class="icon">➡</span>
                </button>
            </div>

            <!-- Shadowing Goal Completion UI -->
            <div id="shadowing-completion" class="completion-screen hidden">
                <div class="check-mark">🎉</div>
                <h2>今日跟讀完成！</h2>
                <p>建議休息讓大腦吸收，是否繼續？</p>
                <div class="flashcard-actions" style="margin-top: 30px;">
                    <button class="btn btn-easy" id="shadowing-continue-btn">繼續練習</button>
                    <button class="btn btn-normal" id="shadowing-end-btn" style="background: var(--secondary); color: var(--text);">今日結束</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Global Components -->
    <div id="notification" class="notification hidden"></div>

    <script src="app.js"></script>
    <template id="view-weakness">
        <div class="view weakness-view">
            <div class="view-header">
                <h1>弱點分析</h1>
                <p class="subtitle">Focus on your learning gaps</p>
            </div>

            <!-- Summary Dashboard -->
            <div id="weakness-summary" class="stats-dashboard">
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="count-gap">-</span>
                        <span class="stat-label">未學單字</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="count-error">-</span>
                        <span class="stat-label">複習錯誤</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="count-memory">-</span>
                        <span class="stat-label">久未複習</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="count-listen">-</span>
                        <span class="stat-label">聽力弱標</span>
                    </div>
                </div>
            </div>

            <!-- Top 10 List -->
            <div class="weakness-section">
                <h3>最弱單字 Top 10</h3>
                <div id="weakness-top-list" class="weakness-list">
                    <!-- Top words injected here -->
                </div>
            </div>

            <!-- Targeted Learning CTA -->
            <div class="targeted-ctas">
                <button class="btn btn-primary shadow-btn" id="weakness-focus-flash">針對性複習</button>
                <button class="btn btn-secondary shadow-btn" id="weakness-focus-listen">針對性聽力</button>
                <button class="btn btn-secondary shadow-btn" id="weakness-focus-shadow" style="grid-column: span 2;">針對性跟讀</button>
            </div>
        </div>
    </template>
</body>
</html>
